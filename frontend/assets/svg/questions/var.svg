<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56">
  <rect width="56" height="56" rx="14" fill="#050F28"/>
  <rect width="56" height="56" rx="14" fill="none" stroke="#0A84FF" stroke-width="1.5"/>
  <!-- Monitor screen -->
  <rect x="8" y="12" width="40" height="26" rx="4" fill="#0A84FF" opacity="0.15" stroke="#0A84FF" stroke-width="1.5"/>
  <rect x="12" y="16" width="32" height="18" rx="2" fill="#0A1A40"/>
  <!-- VAR text on screen -->
  <text x="28" y="28" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial Black, sans-serif" font-size="10" font-weight="900"
        fill="#0A84FF" letter-spacing="1">VAR</text>
  <!-- Scanning lines -->
  <line x1="12" y1="26" x2="44" y2="26" stroke="#0A84FF" stroke-width="0.8" opacity="0.4" stroke-dasharray="2 2"/>
  <!-- Stand -->
  <rect x="24" y="38" width="8" height="5" rx="1" fill="#0A84FF" opacity="0.6"/>
  <rect x="18" y="43" width="20" height="2.5" rx="1.25" fill="#0A84FF" opacity="0.6"/>
  <!-- Magnifier hint -->
  <circle cx="42" cy="42" r="6" fill="none" stroke="#0A84FF" stroke-width="2"/>
  <line x1="46" y1="46" x2="50" y2="50" stroke="#0A84FF" stroke-width="2" stroke-linecap="round"/>
  <circle cx="42" cy="42" r="3" fill="#0A84FF" opacity="0.3"/>
</svg>