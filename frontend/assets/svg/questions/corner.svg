<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56">
  <rect width="56" height="56" rx="14" fill="#1A1200"/>
  <rect width="56" height="56" rx="14" fill="none" stroke="#FFB800" stroke-width="1.5"/>
  <!-- Corner flag -->
  <rect x="10" y="10" width="3" height="28" rx="1.5" fill="#FFB800"/>
  <!-- Flag waving -->
  <path d="M13 10 Q28 12 28 20 Q28 28 13 28" fill="#FFB800" opacity="0.9"/>
  <!-- Corner arc -->
  <path d="M10 38 Q30 38 30 20" fill="none" stroke="#FFB800" stroke-width="2"
        stroke-dasharray="3 2" opacity="0.7"/>
  <!-- Ball -->
  <circle cx="36" cy="40" r="9" fill="white" stroke="#1a1a1a" stroke-width="1"/>
  <polygon points="36,32 39,35 38,39 33,39 32,35" fill="#1a1a1a"/>
  <!-- Arrow showing kick direction -->
  <path d="M22 38 L12 44" stroke="#FFB800" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#FFB800"/>
    </marker>
  </defs>
</svg>