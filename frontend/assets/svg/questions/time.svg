<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56">
  <rect width="56" height="56" rx="14" fill="#1A0D00"/>
  <rect width="56" height="56" rx="14" fill="none" stroke="#FF9500" stroke-width="1.5"/>
  <!-- Clock face -->
  <circle cx="28" cy="30" r="18" fill="#FF9500" opacity="0.12" stroke="#FF9500" stroke-width="2"/>
  <circle cx="28" cy="30" r="2.5" fill="#FF9500"/>
  <!-- Clock hands -->
  <line x1="28" y1="30" x2="28" y2="16" stroke="#FF9500" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="30" x2="38" y2="36" stroke="#FF9500" stroke-width="2" stroke-linecap="round"/>
  <!-- Tick marks -->
  <g stroke="#FF9500" stroke-width="1.5" opacity="0.5">
    <line x1="28" y1="13" x2="28" y2="16"/>
    <line x1="28" y1="44" x2="28" y2="47"/>
    <line x1="11" y1="30" x2="14" y2="30"/>
    <line x1="42" y1="30" x2="45" y2="30"/>
  </g>
  <!-- Crown on top -->
  <rect x="24" y="8" width="8" height="3" rx="1.5" fill="#FF9500" opacity="0.8"/>
  <!-- Addl. time text -->
  <text x="28" y="52" text-anchor="middle" font-family="Arial Black" font-size="6" font-weight="900" fill="#FF9500" letter-spacing="0.5">EXTRA TIME</text>
</svg>