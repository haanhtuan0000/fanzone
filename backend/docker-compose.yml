version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fanzone-postgres
    environment:
      POSTGRES_DB: fanzone
      POSTGRES_USER: fanzone
      POSTGRES_PASSWORD: fanzone_dev_2024
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fanzone-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
